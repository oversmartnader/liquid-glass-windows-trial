name: Build and Release Liquid Glass

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-release:
    runs-on: windows-latest
    
    # Grants the GITHUB_TOKEN permission to create releases and upload assets
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile C++ Source
        run: |
          # /EHsc: Enable standard C++ exception handling
          # /O2: Optimize for speed
          # /MD: Link with dynamic CRT
          # /Fe: Specify output executable name
          # User32.lib and Gdi32.lib are explicitly added for Windowing and BitBlt
          cl.exe /EHsc /O2 /MD main.cpp User32.lib Gdi32.lib /Fe:LiquidGlass.exe

      - name: Create Release and Upload Executable
        uses: softprops/action-gh-release@v2
        with:
          # Creates a unique tag for every run (e.g., build-42)
          tag_name: build-${{ github.run_number }}
          name: "Liquid Glass Build #${{ github.run_number }}"
          body: "Automated release triggered by push to ${{ github.ref_name }}."
          files: LiquidGlass.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
